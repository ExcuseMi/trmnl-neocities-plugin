# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
watch:
  - .trmnlp.yml
  - src

custom_fields: {}

variables:
  trmnl:
    system:
      timestamp_utc: 1700000000
    plugin_settings:
      instance_name: "Neocities Browser"
      strategy: polling
      dark_mode: "no"
      no_screen_padding: "no"
      custom_fields_values:
        sort_by: "random"
        max_page: "10"
  items:
    - name: "JEFBECKER"
      url: "https://jefbecker.com"
      image: "https://neocities.org/site_screenshots/21/53/jefbecker/index.html.540x405.webp"
    - name: "Backlit"
      url: "https://backlit.neocities.org"
      image: "https://neocities.org/site_screenshots/35/35/backlit/index.html.540x405.webp"
    - name: "Dryad Glen"
      url: "https://cyberneticdryad.neocities.org"
      image: "https://neocities.org/site_screenshots/43/06/cyberneticdryad/index.html.540x405.webp"
    - name: "Monnie"
      url: "https://monnie.neocities.org"
      image: "https://neocities.org/site_screenshots/24/52/monnie/index.html.540x405.webp"
